<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>XENOMODS Panel</title>
  <style>
    :root{
      --bg:#0a0d12;
      --bg2:#101520;
      --card:rgba(17,22,31,.84);
      --card2:rgba(22,28,40,.94);
      --line:rgba(255,255,255,.08);
      --line2:rgba(152,118,255,.18);
      --text:#eef2fa;
      --muted:#a8b0c4;
      --muted2:#7d8598;
      --accent:#9a7bff;
      --accent2:#6c84ff;
      --good:#49d98a;
      --bad:#ff6b8b;
      --warn:#ffcb6b;
      --shadow:0 20px 48px rgba(0,0,0,.38);
      --shadow2:0 0 0 1px rgba(255,255,255,.03), 0 0 26px rgba(154,123,255,.08);
      --radius:22px;
      --sidebar:285px;
      --topbar:74px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:
      radial-gradient(circle at 20% 10%, rgba(154,123,255,.16), transparent 28%),
      radial-gradient(circle at 85% 12%, rgba(108,132,255,.12), transparent 20%),
      linear-gradient(180deg,#090b10 0%, #0d1118 52%, #0a0d12 100%);
      color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
    body::before{
      content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.18;
      background-image:linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size:36px 36px
    }
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    .hidden{display:none !important}
    .wrap{position:relative;z-index:1;min-height:100vh}
    .auth-shell{
      min-height:100vh;display:grid;place-items:center;padding:24px
    }
    .auth-card{
      width:min(980px,100%);
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(17,21,30,.92), rgba(11,14,20,.96));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-columns:1.05fr .95fr;
    }
    .auth-left{
      padding:30px;
      border-right:1px solid rgba(255,255,255,.06);
      background:
        radial-gradient(circle at 18% 20%, rgba(154,123,255,.2), transparent 32%),
        radial-gradient(circle at 85% 30%, rgba(108,132,255,.16), transparent 28%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      display:flex;flex-direction:column;justify-content:space-between;gap:18px
    }
    .brand{
      display:flex;align-items:center;gap:14px
    }
    .logo{
      width:56px;height:56px;border-radius:18px;display:grid;place-items:center;
      background:linear-gradient(135deg, rgba(154,123,255,.34), rgba(108,132,255,.18));
      box-shadow:0 0 24px rgba(154,123,255,.2);
      font-weight:900;font-size:1.04rem
    }
    .brand h1{margin:0;font-size:1.15rem;line-height:1.05}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:.85rem}
    .hero-title{font-size:2.15rem;line-height:1.05;margin:0;letter-spacing:-.02em}
    .hero-title span{color:#d9ccff}
    .hero-desc{color:var(--muted);line-height:1.7;margin:14px 0 0;max-width:55ch}
    .feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:10px}
    .mini{
      padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)
    }
    .mini .k{color:var(--muted);font-size:.8rem}
    .mini .v{font-weight:800;margin-top:7px}
    .mini .s{color:var(--muted2);font-size:.8rem;margin-top:5px;line-height:1.45}
    .auth-right{padding:26px}
    .tabs{display:flex;gap:8px;margin-bottom:18px;background:rgba(255,255,255,.03);padding:6px;border-radius:18px;border:1px solid rgba(255,255,255,.06)}
    .tab{
      flex:1;border:none;border-radius:14px;padding:12px 14px;cursor:pointer;color:var(--muted);
      background:transparent;font-weight:800
    }
    .tab.active{background:linear-gradient(135deg, rgba(154,123,255,.2), rgba(108,132,255,.12));color:#fff}
    .form{display:grid;gap:12px}
    .field label{display:block;font-size:.82rem;color:var(--muted);margin:0 0 7px}
    .input,.select,.textarea{
      width:100%;padding:13px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);
      background:rgba(8,10,14,.9);color:var(--text);outline:none
    }
    .input:focus,.select:focus,.textarea:focus{border-color:rgba(154,123,255,.5);box-shadow:0 0 0 3px rgba(154,123,255,.12)}
    .textarea{min-height:120px;resize:vertical;line-height:1.55}
    .btn{
      border:none;cursor:pointer;color:#fff;font-weight:800;padding:12px 14px;border-radius:15px;
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);transition:.18s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px
    }
    .btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(0,0,0,.25)}
    .btn.primary{background:linear-gradient(135deg, rgba(154,123,255,.96), rgba(108,132,255,.58));border-color:transparent}
    .btn.good{background:linear-gradient(135deg, rgba(73,217,138,.92), rgba(83,190,126,.52));border-color:transparent}
    .btn.bad{background:linear-gradient(135deg, rgba(255,107,139,.92), rgba(255,142,92,.52));border-color:transparent}
    .btn.ghost{background:rgba(255,255,255,.03)}
    .muted{color:var(--muted)}
    .small{font-size:.84rem;line-height:1.55}
    .note{
      padding:12px 14px;border-radius:16px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);color:var(--muted);line-height:1.6;font-size:.86rem
    }
    .app{
      position:relative;z-index:1;min-height:100vh;display:grid;grid-template-columns:var(--sidebar) 1fr
    }
    .sidebar{
      position:sticky;top:0;height:100vh;padding:16px;border-right:1px solid rgba(255,255,255,.05);
      background:linear-gradient(180deg, rgba(13,16,23,.95), rgba(9,11,16,.92));
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)
    }
    .brand-box{
      padding:14px;border-radius:20px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:var(--shadow2);display:flex;align-items:center;gap:12px
    }
    .brand-box .logo{width:48px;height:48px;border-radius:16px}
    .brand-box h2{margin:0;font-size:1rem}
    .brand-box p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
    .nav{margin-top:14px;display:flex;flex-direction:column;gap:8px}
    .nav button{
      width:100%;display:flex;align-items:center;gap:12px;padding:13px 14px;border:none;border-radius:16px;cursor:pointer;
      color:var(--muted);background:transparent;text-align:left;font-weight:750;transition:.18s ease
    }
    .nav button:hover,.nav button.active{background:linear-gradient(135deg, rgba(154,123,255,.16), rgba(108,132,255,.08));color:#fff}
    .nav .ic{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.05)}
    .sidebox{margin-top:14px;padding:14px;border-radius:18px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03)}
    .topbar{
      position:sticky;top:0;z-index:20;min-height:var(--topbar);padding:12px 14px;
      border:1px solid rgba(255,255,255,.06);border-radius:22px;background:linear-gradient(180deg, rgba(14,17,24,.88), rgba(11,13,18,.74));
      box-shadow:var(--shadow2);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      display:flex;align-items:center;justify-content:space-between;gap:12px
    }
    .top-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
    .menu{display:none;width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#fff}
    .titles h3{margin:0;font-size:1.02rem}
    .titles p{margin:4px 0 0;color:var(--muted);font-size:.82rem}
    .top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .search{
      width:min(390px, 48vw);min-width:220px;display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:16px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07)
    }
    .search input{all:unset;flex:1;color:var(--text);font-size:.95rem}
    .main{min-width:0;padding:16px;display:flex;flex-direction:column;gap:16px}
    .page{display:none;animation:fade .18s ease}
    .page.active{display:block}
    @keyframes fade{from{opacity:.5;transform:translateY(5px)}to{opacity:1;transform:none}}
    .grid{display:grid;gap:14px}
    .g-2{grid-template-columns:repeat(2,1fr)}
    .g-3{grid-template-columns:repeat(3,1fr)}
    .g-4{grid-template-columns:repeat(4,1fr)}
    .card,.panel{
      border-radius:22px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      box-shadow:var(--shadow2)
    }
    .card{padding:16px}
    .panel{padding:20px}
    .hero{display:grid;grid-template-columns:1.35fr .85fr;gap:14px}
    .hero h4{margin:0;font-size:1.5rem;line-height:1.08}
    .hero h4 span{color:#d9ccff}
    .hero p{margin:12px 0 0;line-height:1.7;color:var(--muted)}
    .actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
    .stat{padding:16px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .stat .k{color:var(--muted);font-size:.84rem}
    .stat .v{font-size:1.85rem;font-weight:900;margin-top:8px}
    .stat .s{color:var(--muted2);font-size:.8rem;margin-top:7px}
    .section-head{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:12px}
    .section-head h4{margin:0;font-size:1.02rem}
    .section-head p{margin:5px 0 0;color:var(--muted);font-size:.85rem}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .table-wrap{overflow:auto;border-radius:18px;border:1px solid rgba(255,255,255,.06)}
    table{width:100%;border-collapse:separate;border-spacing:0;min-width:840px;background:rgba(8,10,14,.3)}
    th,td{padding:13px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top;text-align:left}
    th{position:sticky;top:0;background:rgba(14,16,22,.95);backdrop-filter:blur(10px);color:var(--muted);font-size:.82rem;text-transform:uppercase;letter-spacing:.08em}
    tr:hover td{background:rgba(255,255,255,.02)}
    .avatar{
      width:42px;height:42px;border-radius:14px;display:grid;place-items:center;overflow:hidden;
      background:linear-gradient(135deg, rgba(154,123,255,.32), rgba(108,132,255,.16));border:1px solid rgba(255,255,255,.08);font-weight:900
    }
    .avatar img{width:100%;height:100%;object-fit:cover;display:block}
    .meta{display:flex;gap:12px;align-items:center}
    .name{font-weight:850}
    .sub{color:var(--muted);font-size:.84rem;margin-top:3px;line-height:1.45}
    .tiny{color:var(--muted2);font-size:.78rem}
    .tags{display:flex;flex-wrap:wrap;gap:6px}
    .tag{padding:6px 9px;border-radius:999px;font-size:.72rem;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.04);color:var(--muted)}
    .tag.on{color:#dbffe9;background:rgba(73,217,138,.1);border-color:rgba(73,217,138,.18)}
    .tag.off{color:#ffdbe4;background:rgba(255,107,139,.1);border-color:rgba(255,107,139,.18)}
    .tag.warn{color:#ffe6ad;background:rgba(255,203,107,.1);border-color:rgba(255,203,107,.18)}
    .tag.blue{color:#dfe8ff;background:rgba(108,132,255,.1);border-color:rgba(108,132,255,.18)}
    .icon-btn{
      width:38px;height:38px;border-radius:12px;border:1px solid rgba(255,255,255,.07);
      background:rgba(255,255,255,.04);color:#fff;cursor:pointer;display:inline-grid;place-items:center
    }
    .icon-btn:hover{transform:translateY(-1px)}
    .icon-btn.bad:hover{border-color:rgba(255,107,139,.35)}
    .row-actions{display:flex;gap:8px;flex-wrap:wrap}
    .empty{
      padding:24px;text-align:center;color:var(--muted);border-radius:18px;background:rgba(255,255,255,.03);
      border:1px dashed rgba(255,255,255,.1)
    }
    .progress{
      width:100%;height:10px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden
    }
    .progress > div{height:100%;border-radius:inherit;background:linear-gradient(90deg, rgba(154,123,255,.95), rgba(108,132,255,.8))}
    .kbox{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;word-break:break-all;line-height:1.5}
    .inline{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .check-list{display:flex;flex-wrap:wrap;gap:8px}
    .check-pill{
      display:inline-flex;align-items:center;gap:10px;padding:10px 13px;border-radius:14px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.06);color:var(--muted);font-weight:700;cursor:pointer;user-select:none
    }
    .check-pill.on{color:#fff;border-color:rgba(154,123,255,.35);background:rgba(154,123,255,.14)}
    .check-pill input{accent-color:var(--accent)}
    .modal-backdrop{
      position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.58)
    }
    .modal-backdrop.show{display:flex}
    .modal{
      width:min(980px,100%);max-height:calc(100vh - 32px);overflow:auto;
      border-radius:26px;border:1px solid var(--line);background:linear-gradient(180deg, rgba(18,22,30,.98), rgba(12,15,21,.98));
      box-shadow:var(--shadow)
    }
    .modal-head{
      position:sticky;top:0;z-index:3;display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.06);background:rgba(15,18,25,.97)
    }
    .modal-head h4{margin:0;font-size:1.02rem}
    .modal-body{padding:18px}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px}
    .close{
      width:40px;height:40px;border:none;border-radius:12px;background:rgba(255,255,255,.05);color:#fff;cursor:pointer
    }
    .toast-wrap{
      position:fixed;right:16px;bottom:16px;z-index:1200;display:flex;flex-direction:column;gap:10px;pointer-events:none
    }
    .toast{
      min-width:220px;max-width:330px;padding:12px 14px;border-radius:16px;background:rgba(14,16,24,.97);
      border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 40px rgba(0,0,0,.35);pointer-events:auto
    }
    .toast .t{font-weight:850;margin-bottom:4px}
    .toast .m{color:var(--muted);font-size:.88rem;line-height:1.45}
    .toast.success{border-color:rgba(73,217,138,.2)}
    .toast.error{border-color:rgba(255,107,139,.22)}
    .toggle{
      display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none
    }
    .toggle input{position:absolute;opacity:0;width:0;height:0}
    .toggle .track{
      width:40px;height:22px;border-radius:999px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.1);position:relative;transition:.18s ease
    }
    .toggle .track::after{
      content:"";position:absolute;width:16px;height:16px;border-radius:50%;top:2px;left:2px;background:#fff;transition:.18s ease
    }
    .toggle input:checked + .track{background:var(--accent);border-color:var(--accent)}
    .toggle input:checked + .track::after{transform:translateX(18px)}
    .badge{
      display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);font-size:.76rem;font-weight:800;letter-spacing:.02em
    }
    .badge.admin{color:#f6e8ff;background:rgba(154,123,255,.16)}
    .badge.user{color:#e3f0ff;background:rgba(108,132,255,.14)}
    .badge.other{color:#fff7df;background:rgba(255,203,107,.12)}
    .flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .divider{height:1px;background:rgba(255,255,255,.06);margin:14px 0}
    .stats-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .stats-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    @media (max-width: 1120px){
      .auth-card,.hero,.g-4,.g-3,.g-2,.stats-3,.stats-2{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        position:fixed;inset:0 auto 0 0;width:min(88vw,320px);transform:translateX(-102%);
        transition:transform .25s ease;z-index:900;box-shadow:24px 0 60px rgba(0,0,0,.45)
      }
      .sidebar.open{transform:translateX(0)}
      .menu{display:inline-grid;place-items:center}
      .topbar{flex-wrap:wrap;border-radius:18px}
      .top-left,.top-right{width:100%}
      .search{width:100%;min-width:0}
      .main{padding:14px}
      .auth-card{grid-template-columns:1fr}
      .auth-left{border-right:none;border-bottom:1px solid rgba(255,255,255,.06)}
    }
    @media (max-width: 640px){
      .hero,.g-4,.g-3,.g-2,.stats-3,.stats-2,.feature-grid{grid-template-columns:1fr}
      .panel,.card,.modal,.auth-card{border-radius:18px}
      .btn{width:100%}
      .top-right .btn{width:auto;flex:1 1 0}
      table{min-width:760px}
      .auth-shell{padding:12px}
      .auth-right,.auth-left{padding:18px}
      .hero-title{font-size:1.8rem}
    }
  </style>
</head>
<body>

  <div id="appRoot"></div>

  function normalize(raw){
    const seed = seedState();
    if(!raw || typeof raw !== 'object') return seed;
    return {
      session: { ...seed.session, ...(raw.session || {}) },
      users: Array.isArray(raw.users) && raw.users.length ? raw.users.map(u => ({
        id: u.id || uid('user'),
        username: String(u.username || '').trim(),
        displayName: String(u.displayName || u.username || 'User').trim(),
        password: String(u.password || '1234'),
        email: String(u.email || ''),
        role: String(u.role || 'user'),
        status: String(u.status || 'active'),
        createdAt: u.createdAt || now(),
        todaySales: Number(u.todaySales || 0),
        monthSales: Number(u.monthSales || 0),
        totalSales: Number(u.totalSales || 0),
        targetToday: Number(u.targetToday || 0),
        targetMonth: Number(u.targetMonth || 0),
        rank: String(u.rank || 'User'),
        visibleKeyIds: Array.isArray(u.visibleKeyIds) ? u.visibleKeyIds : []
      })) : seed.users,
      keys: Array.isArray(raw.keys) ? raw.keys.map(k => ({
        id: k.id || uid('key'),
        value: String(k.value || '').trim(),
        category: String(k.category || 'Free Fire'),
        status: String(k.status || 'stock'),
        note: String(k.note || ''),
        assignedTo: k.assignedTo || null,
        visibleTo: Array.isArray(k.visibleTo) ? k.visibleTo : ['all'],
        createdAt: k.createdAt || now(),
        issuedAt: k.issuedAt || null,
        expiresAt: k.expiresAt || '',
        visible: k.visible !== false
      })) : seed.keys,
      announcements: Array.isArray(raw.announcements) ? raw.announcements : seed.announcements,
      logs: Array.isArray(raw.logs) ? raw.logs : seed.logs,
      settings: { ...seed.settings, ...(raw.settings || {}) }
    };
  }

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE);
      if(!raw) return seedState();
      return normalize(JSON.parse(raw));
    }catch(e){
      return seedState();
    }
  }

  function saveState(){
    localStorage.setItem(STORAGE, JSON.stringify(state));
  }

  function currentUser(){
    return state.users.find(u => u.id === state.session.userId) || null;
  }

  function isAdmin(user=currentUser()){
    if(!user) return false;
    return ['superadmin','owner','admin','moderator'].includes(user.role);
  }

  function isSuper(user=currentUser()){
    return !!user && ['superadmin','owner'].includes(user.role);
  }

  function canManageUsers(user=currentUser()){
    return !!user && ['superadmin','owner','admin'].includes(user.role);
  }

  function canManageKeys(user=currentUser()){
    return !!user && ['superadmin','owner','admin'].includes(user.role);
  }

  function canManageAnnouncements(user=currentUser()){
    return !!user && ['superadmin','owner','admin','moderator'].includes(user.role);
  }

  function canViewLogs(user=currentUser()){
    return !!user && ['superadmin','owner','admin'].includes(user.role);
  }

  function visibleKeysFor(user=currentUser()){
    if(!user) return [];
    if(isAdmin(user)) return state.keys;
    return state.keys.filter(k => {
      const list = Array.isArray(k.visibleTo) ? k.visibleTo : [];
      return list.includes('all') || list.includes(user.id) || k.assignedTo === user.id;
    });
  }

  function userVisibleStats(user=currentUser()){
    const keys = visibleKeysFor(user);
    const visible = keys.length;
    const assigned = keys.filter(k => k.assignedTo === user.id).length;
    const visibleAll = keys.filter(k => (k.visibleTo || []).includes('all')).length;
    return { visible, assigned, visibleAll };
  }

    setTimeout(() => {
      el.style.opacity = '0';
      el.style.transform = 'translateY(8px)';
      el.style.transition = 'all .22s ease';

    setTimeout(() => el.remove(), 3000);
  }

    openModal(modalShell('Bulk Add Keys', `

          <label>วาง key หลายบรรทัด</label>

              <option value="hidden">ซ่อน</option>

          </div>
        </div>
        <div class="field" id="bulkUsersWrap" style="display:none">
          <label>User ที่อนุญาต</label>

            ${state.users.filter(u => u.role !== 'superadmin').map(u => `
              <label class="check-pill"><input type="checkbox" name="allowed" value="${u.id}" />${esc(u.displayName)}</label>
            `).join('')}
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn ghost" type="button" data-close>Cancel</button>
          <button class="btn primary" type="submit">Save Keys</button>
        </div>
      </form>
    `));
    const form = $('#bulkKeyForm');
    const sel = form.querySelector('[name="visibleType"]');
    const wrap = $('#bulkUsersWrap');
    sel.addEventListener('change', () => wrap.style.display = sel.value === 'selected' ? 'block' : 'none');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(form);
      const lines = String(fd.get('keys') || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
      const unique = [...new Set(lines)];
      if(!unique.length) return toast('ผิดพลาด', 'วาง key อย่างน้อย 1 บรรทัด', 'error');
      const visibleType = String(fd.get('visibleType') || 'all');
      const allowed = visibleType === 'selected' ? fd.getAll('allowed') : (visibleType === 'all' ? ['all'] : []);
      let added = 0;
      unique.forEach(v => {
        if(state.keys.some(k => k.value.toLowerCase() === v.toLowerCase())) return;
        state.keys.unshift({
          id: uid('key'),
          value: v,
          category: String(fd.get('category') || 'Free Fire'),
          status: visibleType === 'hidden' ? 'hidden' : 'stock',
          note: 'bulk import',
          assignedTo: null,
          visibleTo: allowed,
          createdAt: now(),
          issuedAt: null,
          expiresAt: '',
          visible: visibleType !== 'hidden'
        });
        added++;
      });
      saveState();
      log('Bulk Add Keys', `Added ${added} keys`);
      closeModal();
      renderPage();
      toast('สำเร็จ', `เพิ่มคีย์ ${added} รายการแล้ว`);
    });
  }

  function bindAuthEvents(){
    $$('.tab').forEach(btn => btn.addEventListener('click', () => {
      currentTab = btn.dataset.tab;
      renderAuth();
      bindAuthEvents();
    }));
    const loginFormEl = $('#loginForm');
    const registerFormEl = $('#registerForm');
    if(loginFormEl){
      loginFormEl.addEventListener('submit', e => {
        e.preventDefault();
        const fd = new FormData(loginFormEl);
        const username = String(fd.get('username') || '').trim();
        const password = String(fd.get('password') || '');
        const remember = !!fd.get('remember');
        const user = state.users.find(u => u.username.toLowerCase() === username.toLowerCase() && u.password === password);
        if(!user) return toast('เข้าสู่ระบบไม่สำเร็จ', 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
        if(user.status === 'banned') return toast('ถูกระงับ', 'บัญชีนี้ถูกแบน', 'error');
        state.session.userId = user.id;
        state.session.token = uid('token');
        state.session.remember = remember;
        saveState();
        log('Login', 'User logged in', user.id);
        toast('ยินดีต้อนรับ', user.displayName);
        currentPage = isAdmin(user) ? 'dashboard' : 'dashboard';
        renderApp();
      });
    }
    if(registerFormEl){
      registerFormEl.addEventListener('submit', e => {
        e.preventDefault();
        if(!state.settings.publicRegistration) return toast('ปิดสมัคร', 'ระบบสมัครสมาชิกถูกปิดอยู่', 'error');
        const fd = new FormData(registerFormEl);
        const username = String(fd.get('username') || '').trim();
        const displayName = String(fd.get('displayName') || '').trim();
        const email = String(fd.get('email') || '').trim();
        const password = String(fd.get('password') || '');
        if(username.length < 3) return toast('ผิดพลาด', 'username สั้นเกินไป', 'error');
        if(password.length < 4) return toast('ผิดพลาด', 'รหัสผ่านสั้นเกินไป', 'error');
        if(state.users.some(u => u.username.toLowerCase() === username.toLowerCase())) return toast('ผิดพลาด', 'username นี้มีแล้ว', 'error');
        const user = {id:uid('user'), username, displayName, password, email, role:'user', status:'active', createdAt:now(), todaySales:0, monthSales:0, totalSales:0, targetToday:0, targetMonth:0, rank:'User', visibleKeyIds:[]};
        state.users.unshift(user);
        state.session.userId = user.id;
        state.session.token = uid('token');
        saveState();
        log('Register', 'New user registered', user.id);
        toast('สำเร็จ', 'สมัครสมาชิกแล้ว');
        renderApp();
      });
    }
  }

  function bindAppEvents(){
    const menuBtn = $('#menuBtn');
    if(menuBtn) menuBtn.addEventListener('click', () => $('#sidebar').classList.toggle('open'));

    const nav = $('#nav');
    if(nav){
      nav.addEventListener('click', e => {
        const btn = e.target.closest('[data-page]');
        if(!btn) return;
        setPage(btn.dataset.page);
      });
    }

    const globalSearch = $('#globalSearch');
    if(globalSearch){
      globalSearch.addEventListener('input', e => {
        uiSearch = e.target.value;
        renderPage();
      });
    }

    modalBackdrop.addEventListener('click', e => {
      if(e.target === modalBackdrop) closeModal();
    });

    $('#importFile')?.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const text = await file.text();
      try{
        const data = JSON.parse(text);
        state = normalize(data);
        saveState();
        toast('สำเร็จ', 'นำเข้าข้อมูลแล้ว');
        renderApp();
      }catch(err){
        toast('ผิดพลาด', 'ไฟล์ JSON ไม่ถูกต้อง', 'error');
      }
      e.target.value = '';
    });

    if(!window.__xmModalBound){
      modalBackdrop.addEventListener('input', e => {
        const item = e.target.closest('[name="visibleAll"]');
        if(item){
          const form = e.target.closest('form');
          if(!form) return;
          const checked = item.checked;
          $$('[name="visibleTo"]', form).forEach(cb => {
            cb.disabled = checked;
            cb.closest('.check-pill').classList.toggle('on', checked || cb.checked);
          });
        }
      });

      modalBackdrop.addEventListener('change', e => {
        const cb = e.target.closest('[name="visibleTo"]');
        if(cb){
          cb.closest('.check-pill').classList.toggle('on', cb.checked);
        }
      });

      modalBackdrop.addEventListener('submit', e => {
        const form = e.target.closest('form');
        if(!form) return;
        if(form.id === 'loginForm' || form.id === 'registerForm' || form.id === 'userForm' || form.id === 'keyForm' || form.id === 'bulkKeyForm' || form.id === 'annForm') return;
      }, true);
      window.__xmModalBound = true;
    }
  }

  function copyKey(id){
    const k = state.keys.find(x => x.id === id);
    if(!k) return;
    const user = currentUser();
    if(!isAdmin(user) && !(visibleKeysFor(user).some(v => v.id === k.id))) return toast('ไม่มีสิทธิ์', 'คีย์นี้ไม่ถูกอนุญาตให้ดู', 'error');
    navigator.clipboard?.writeText(k.value).then(() => {
      log('Copy Key', k.value, k.id);
      toast('คัดลอกแล้ว', k.value);
    }).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = k.value;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      log('Copy Key', k.value, k.id);
      toast('คัดลอกแล้ว', k.value);
    });
  }

  function exportJson(){
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'xenomods-panel-backup.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export แล้ว', 'ดาวน์โหลด JSON สำเร็จ');
    log('Export JSON', 'Backup exported');
  }

  function exportCsv(){
    const rows = [['username','displayName','role','status','todaySales','monthSales','targetToday','targetMonth']];
    state.users.forEach(u => rows.push([u.username,u.displayName,u.role,u.status,u.todaySales,u.monthSales,u.targetToday,u.targetMonth]));
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'xenomods-users-report.csv';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export CSV แล้ว', 'ดาวน์โหลดรายงานสำเร็จ');
    log('Export CSV', 'Users report exported');
  }

  function init(){
    seedIfNeeded();
    const user = currentUser();
    if(user){
      if(user.status === 'banned'){
        state.session = {userId:null, token:null, remember:false};
        saveState();
        toast('บัญชีถูกระงับ', 'บัญชีนี้ถูกแบน', 'error');
        renderAuth();
        bindAuthEvents();
        return;
      }
      renderApp();
      bindAppEvents();
      return;
    }
    renderAuth();
    bindAuthEvents();
  }

  // Handle modal form action specific event delegation
  modalBackdrop.addEventListener('click', e => {
    const closeBtn = e.target.closest('[data-close]');
    if(closeBtn){ closeModal(); return; }

    const btn = e.target.closest('[data-act]');
    if(!btn) return;
    const act = btn.dataset.act;
    if(act === 'copy-key') copyKey(btn.dataset.id);
  });

  // Dedicated listeners after modal content exists
  modalBackdrop.addEventListener('submit', e => {
    const form = e.target;
    if(form.id === 'userForm' || form.id === 'keyForm' || form.id === 'bulkKeyForm' || form.id === 'annForm' || form.id === 'settingsForm' || form.id === 'passwordForm'){
      // forms are handled in their specific creators or bindPageEvents
      return;
    }
  }, true);

  // Generic action delegation on main app
  appRoot.addEventListener('click', e => {
    const act = e.target.closest('[data-act]');
    if(!act) return;
    const user = currentUser();

    if(act.dataset.act === 'new-user'){ openUserModal(null); }
    if(act.dataset.act === 'new-key'){ openKeyModal(null); }
    if(act.dataset.act === 'bulk-keys'){ openBulkKeyModal(); }
    if(act.dataset.act === 'new-announcement'){ openAnnouncementModal(null); }
    if(act.dataset.act === 'export-json'){ exportJson(); }
    if(act.dataset.act === 'export-csv'){ exportCsv(); }
    if(act.dataset.act === 'clear-data'){
      if(confirm('ล้างข้อมูลทั้งหมด?')){
        localStorage.removeItem(STORAGE);
        state = seedState();
        uiSearch = '';
        currentPage = 'dashboard';
        renderAuth(); bindAuthEvents();
      }
    }
    if(act.dataset.act === 'go-logs'){ currentPage = 'logs'; renderApp(); }
    if(act.dataset.act === 'page-mykeys'){ currentPage = isAdmin(user) ? 'keys' : 'mykeys'; renderApp(); }
    if(act.dataset.act === 'page-announcements'){ currentPage = 'announcements'; renderApp(); }
    if(act.dataset.act === 'page-dealers'){ currentPage = 'dealers'; renderApp(); }
    if(act.dataset.act === 'logout'){
      state.session = {userId:null, token:null, remember:false};
      saveState();
      currentPage = 'dashboard';
      uiSearch = '';
      renderAuth(); bindAuthEvents();
      return;
    }

    if(act.dataset.act === 'edit-user') openUserModal(state.users.find(u => u.id === act.dataset.id));
    if(act.dataset.act === 'delete-user'){
      if(!confirm('ลบ user นี้?')) return;
      const id = act.dataset.id;
      state.users = state.users.filter(u => u.id !== id);
      state.keys.forEach(k => {
        if(k.assignedTo === id){ k.assignedTo = null; k.status = 'stock'; k.issuedAt = null; }
        k.visibleTo = (k.visibleTo || []).filter(v => v !== id);
      });
      saveState(); log('Delete User', id); renderPage(); toast('สำเร็จ', 'ลบ user แล้ว');
    }
    if(act.dataset.act === 'user-keys') openUserKeysModal(act.dataset.id);
    if(act.dataset.act === 'edit-key') openKeyModal(state.keys.find(k => k.id === act.dataset.id));
    if(act.dataset.act === 'delete-key'){
      if(!confirm('ลบคีย์นี้?')) return;
      state.keys = state.keys.filter(k => k.id !== act.dataset.id);
      saveState(); log('Delete Key', act.dataset.id); renderPage(); toast('สำเร็จ', 'ลบ key แล้ว');
    }
    if(act.dataset.act === 'copy-key') copyKey(act.dataset.id);
    if(act.dataset.act === 'edit-announcement') openAnnouncementModal(state.announcements.find(a => a.id === act.dataset.id));
    if(act.dataset.act === 'delete-announcement'){
      if(!confirm('ลบประกาศนี้?')) return;
      state.announcements = state.announcements.filter(a => a.id !== act.dataset.id);
      saveState(); log('Delete Announcement', act.dataset.id); renderPage(); toast('สำเร็จ', 'ลบประกาศแล้ว');
    }
  });

  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-page]');
    if(!btn) return;
    const user = currentUser();
    if(!user) return;
    currentPage = btn.dataset.page;
    renderApp();
    if(window.innerWidth <= 900){
      const sidebar = $('#sidebar');
      sidebar && sidebar.classList.remove('open');
    }
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModal();
  });

  // initial bind for modals on submit
  modalBackdrop.addEventListener('submit', e => {
    const form = e.target;
    if(form.id === 'settingsForm'){
      e.preventDefault();
      const fd = new FormData(form);
      state.settings.systemName = String(fd.get('systemName') || 'XENOMODS');
      state.settings.tagline = String(fd.get('tagline') || '');
      state.settings.maintenance = fd.get('maintenance') === 'true';
      state.settings.publicRegistration = fd.get('publicRegistration') === 'true';
      state.settings.announceNewKey = fd.get('announceNewKey') === 'true';
      state.settings.passwordPolicy = String(fd.get('passwordPolicy') || 'min4');
      saveState();
      log('Settings', 'System settings changed');
      closeModal();
      renderPage();
      toast('สำเร็จ', 'บันทึกการตั้งค่าแล้ว');
    }
    if(form.id === 'passwordForm'){
      e.preventDefault();
      const fd = new FormData(form);
      const user = currentUser();
      if(String(fd.get('oldPassword') || '') !== user.password) return toast('ผิดพลาด', 'รหัสผ่านเก่าไม่ถูกต้อง', 'error');
      const next = String(fd.get('newPassword') || '').trim();
      if(next.length < 4) return toast('ผิดพลาด', 'รหัสผ่านใหม่สั้นเกินไป', 'error');
      user.password = next;
      saveState();
      log('Password Change', user.displayName, user.id);
      toast('สำเร็จ', 'เปลี่ยนรหัสผ่านแล้ว');
      form.reset();
    }
  }, true);

  // Make auth page interactive
  modalBackdrop.addEventListener('click', e => {
    if(e.target === modalBackdrop) closeModal();
  });

  // Render on start
  init();
})();
</script>
</body>
</html>
